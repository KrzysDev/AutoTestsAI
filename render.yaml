services:
  - type: web
    name: ai-test-generator
    runtime: python
    buildCommand: |
      apt-get update && apt-get install -y \
        libpango-1.0-0 \
        libpangoft2-1.0-0 \
        libpangocairo-1.0-0 \
        libcairo2 \
        libcairo2-dev \
        libgdk-pixbuf2.0-0 \
        libgobject-2.0-0 \
        libglib2.0-0 \
        libffi-dev \
        shared-mime-info \
        fonts-liberation \
        fonts-dejavu-core \
        fontconfig \
      && pip install --upgrade pip \
      && pip install -r requirements.txt
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true